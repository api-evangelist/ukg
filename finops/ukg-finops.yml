billingModel:
  pricingCategory: Enterprise Subscription
  billingFrequency: Monthly
  billingCurrency: USD
  chargeCategories:
    - Purchase
    - Tax
    - Adjustment
focusColumns:
  ServiceName: UKG
  ServiceCategory: HCM / Workforce Management
  ProviderName: UKG
  PublisherName: UKG Inc.
