description: 'FOCUS-aligned FinOps for UKG: HCM SaaS billed under enterprise contract; per-employee /
  per-module pricing not published publicly. Spend reconciliation requires the customer-only Developer
  Hub and contract-side invoice detail.'
notes: UKG does not publish public per-module / per-employee pricing or usage telemetry. Meters and FOCUS
  columns are placeholders pending reconciliation against an actual contract and invoice.
