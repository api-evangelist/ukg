meters:
  - name: employees_per_employee_per_month
    description: PEPM consumption (typical UKG billing primitive — exact value contractual)
    unit: seat
    aggregation: max
    dimensions:
      - product
      - module
  - name: module_subscription
    description: Module-level entitlement (Payroll, Time, Talent, Benefits, etc.)
    unit: month
    aggregation: sum
    dimensions:
      - module
principles:
  - name: Visibility
    description: Track active employee headcount per UKG module via the gated Developer Hub APIs and
      the UKG admin console; reconcile against the contract PEPM rate.
  - name: Allocation
    description: Allocate to business units / cost centers using UKG organization hierarchy and labor-account
      structures.
  - name: Optimization
    description: Right-size module subscriptions; deactivate unused entitlements during renewals; consolidate
      between UKG Pro and UKG Ready footprints where possible.
  - name: Accountability
    description: HRIS / Total Rewards owners review headcount-driven UKG spend ahead of renewal; finance
      validates PEPM against the invoice.
