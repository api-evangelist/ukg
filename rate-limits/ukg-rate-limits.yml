specification: API Commons Rate Limits
specificationVersion: '0.1'
schema: https://raw.githubusercontent.com/api-evangelist/interface-research/main/schema/api-commons.yml#/$defs/RateLimits
provider: UKG
providerId: ukg
created: '2026-05-04'
modified: '2026-05-05'
reconciled: false
tags:
  - HCM
  - Workforce Management
  - Rate Limiting
description: UKG does not publish API rate limits on its public-facing Developer Hub pages. Limits, throttling
  thresholds, and retry guidance live behind the login-gated developer portal and inside individual UKG
  Pro / Ready / Dimensions contracts.
notes: Public Developer Hub pages do not expose rate-limit numbers; full documentation requires login.
  Reconciled remains false until limits can be sourced from the gated portal.
sources:
  - https://developer.ukg.com/
limits:
  - name: Tenant-Configured Limit
    scope: tenant
    metric: varies
    limit: see UKG Developer Hub (login required)
    notes: Specific values are not published on public pages; review the customer-only Developer Hub
      for the operative product (UKG Pro, UKG Ready, UKG Dimensions).
policies:
  - name: Login-Gated Documentation
    description: UKG Developer Hub requires a customer / partner login; rate-limit numbers are reachable
      only after authentication.
  - name: Backoff
    description: Apply exponential backoff with jitter; honor any Retry-After header returned by the
      service.
maintainers:
