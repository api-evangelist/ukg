naftiko: "1.0.0-alpha1"

info:
  label: "UKG Pro WFM API"
  description: "Workforce management API for timekeeping, scheduling, accruals, and attendance."
  tags:
    - UKG
    - WFM
    - Timekeeping
    - Scheduling
    - Accruals
  created: "2026-05-03"
  modified: "2026-05-03"

binds:
  - namespace: env
    keys:
      UKG_WFM_BEARER_TOKEN: UKG_WFM_BEARER_TOKEN

capability:
  consumes:
    - type: http
      namespace: pro-wfm
      baseUri: https://api.ultipro.com/workforce/v1
      description: "UKG Pro WFM API for timekeeping, scheduling, and accruals."
      authentication:
        type: bearer
        token: "{{UKG_WFM_BEARER_TOKEN}}"
      resources:
        - name: wfm-employees
          path: /v1/employees
          description: "WFM employee records"
          operations:
            - name: list-wfm-employees
              method: GET
              description: "List all WFM employee records"
              inputParameters:
                - name: limit
                  in: query
                  type: integer
                  required: false
                  description: "Maximum records to return"
                - name: offset
                  in: query
                  type: integer
                  required: false
                  description: "Number of records to skip"
                - name: locationId
                  in: query
                  type: string
                  required: false
                  description: "Filter by work location"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
        - name: timecards
          path: /v1/employees/{employeeId}/timecards
          description: "Employee timecard records"
          operations:
            - name: get-employee-timecards
              method: GET
              description: "Get timecard records for an employee"
              inputParameters:
                - name: employeeId
                  in: path
                  type: string
                  required: true
                  description: "Employee identifier"
                - name: startDate
                  in: query
                  type: string
                  required: true
                  description: "Start date for timecard retrieval"
                - name: endDate
                  in: query
                  type: string
                  required: true
                  description: "End date for timecard retrieval"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
        - name: punches
          path: /v1/employees/{employeeId}/punches
          description: "Employee clock punch records"
          operations:
            - name: get-employee-punches
              method: GET
              description: "Get punch records for an employee"
              inputParameters:
                - name: employeeId
                  in: path
                  type: string
                  required: true
                  description: "Employee identifier"
                - name: startDate
                  in: query
                  type: string
                  required: false
                  description: "Start date for punch retrieval"
                - name: endDate
                  in: query
                  type: string
                  required: false
                  description: "End date for punch retrieval"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
            - name: create-punch
              method: POST
              description: "Submit a clock punch for an employee"
              inputParameters:
                - name: employeeId
                  in: path
                  type: string
                  required: true
                  description: "Employee identifier"
              inputBody:
                type: object
                properties:
                  punchTime:
                    type: string
                    description: "Punch timestamp"
                  punchType:
                    type: string
                    description: "Type of punch (In, Out, Transfer)"
                  locationId:
                    type: string
                    description: "Location identifier"
                  jobCode:
                    type: string
                    description: "Job code for this punch"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
        - name: accruals
          path: /v1/employees/{employeeId}/accruals
          description: "Employee accrual balances"
          operations:
            - name: get-employee-accruals
              method: GET
              description: "Get accrual balances for an employee"
              inputParameters:
                - name: employeeId
                  in: path
                  type: string
                  required: true
                  description: "Employee identifier"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
        - name: schedules
          path: /v1/schedules
          description: "Workforce schedules"
          operations:
            - name: list-schedules
              method: GET
              description: "List employee schedules for a location and date range"
              inputParameters:
                - name: locationId
                  in: query
                  type: string
                  required: false
                  description: "Location to retrieve schedules for"
                - name: startDate
                  in: query
                  type: string
                  required: true
                  description: "Start date for schedule retrieval"
                - name: endDate
                  in: query
                  type: string
                  required: true
                  description: "End date for schedule retrieval"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
        - name: shifts
          path: /v1/employees/{employeeId}/shifts
          description: "Employee scheduled shifts"
          operations:
            - name: get-employee-shifts
              method: GET
              description: "Get scheduled shifts for an employee"
              inputParameters:
                - name: employeeId
                  in: path
                  type: string
                  required: true
                  description: "Employee identifier"
                - name: startDate
                  in: query
                  type: string
                  required: false
                  description: "Start date"
                - name: endDate
                  in: query
                  type: string
                  required: false
                  description: "End date"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."

  exposes:
    - type: rest
      port: 8101
      namespace: pro-wfm-api
      resources:
        - path: /v1/employees
          name: wfm-employees
          description: "WFM employee records"
          operations:
            - method: GET
              name: list-wfm-employees
              description: "List WFM employees"
              call: "pro-wfm.list-wfm-employees"
              outputParameters:
                - type: object
                  mapping: "$."
    - type: mcp
      port: 9101
      namespace: pro-wfm-mcp
      transport: http
      tools:
        - name: list-wfm-employees
          description: "List all WFM employee records"
          hints:
            readOnly: true
            openWorld: true
          call: "pro-wfm.list-wfm-employees"
          outputParameters:
            - type: object
              mapping: "$."
        - name: get-employee-timecards
          description: "Get timecard records for an employee"
          hints:
            readOnly: true
            openWorld: true
          call: "pro-wfm.get-employee-timecards"
          outputParameters:
            - type: object
              mapping: "$."
        - name: get-employee-punches
          description: "Get clock punch records for an employee"
          hints:
            readOnly: true
            openWorld: true
          call: "pro-wfm.get-employee-punches"
          outputParameters:
            - type: object
              mapping: "$."
        - name: create-punch
          description: "Submit a clock punch for an employee"
          hints:
            readOnly: false
            openWorld: false
          call: "pro-wfm.create-punch"
          outputParameters:
            - type: object
              mapping: "$."
        - name: get-employee-accruals
          description: "Get accrual balances for an employee"
          hints:
            readOnly: true
            openWorld: true
          call: "pro-wfm.get-employee-accruals"
          outputParameters:
            - type: object
              mapping: "$."
        - name: list-schedules
          description: "List workforce schedules"
          hints:
            readOnly: true
            openWorld: true
          call: "pro-wfm.list-schedules"
          outputParameters:
            - type: object
              mapping: "$."
        - name: get-employee-shifts
          description: "Get scheduled shifts for an employee"
          hints:
            readOnly: true
            openWorld: true
          call: "pro-wfm.get-employee-shifts"
          outputParameters:
            - type: object
              mapping: "$."
