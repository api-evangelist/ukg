naftiko: "1.0.0-alpha1"

info:
  label: "UKG Pro HCM API"
  description: "Human capital management API for employee data, payroll, benefits, and personnel actions."
  tags:
    - UKG
    - HCM
    - Employees
    - Payroll
    - Benefits
  created: "2026-05-03"
  modified: "2026-05-03"

binds:
  - namespace: env
    keys:
      UKG_HCM_USERNAME: UKG_HCM_USERNAME
      UKG_HCM_PASSWORD: UKG_HCM_PASSWORD

capability:
  consumes:
    - type: http
      namespace: pro-hcm
      baseUri: https://service.ultipro.com
      description: "UKG Pro HCM API for employee records, payroll, and benefits."
      authentication:
        type: basic
        username: "{{UKG_HCM_USERNAME}}"
        password: "{{UKG_HCM_PASSWORD}}"
      resources:
        - name: employees
          path: /personnel/v2/employees
          description: "Employee records and demographics"
          operations:
            - name: list-employees
              method: GET
              description: "List all employee records"
              inputParameters:
                - name: per_page
                  in: query
                  type: integer
                  required: false
                  description: "Results per page"
                - name: page
                  in: query
                  type: integer
                  required: false
                  description: "Page number"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
            - name: get-employee
              method: GET
              description: "Get a specific employee by ID"
              inputParameters:
                - name: employeeId
                  in: path
                  type: string
                  required: true
                  description: "Employee identifier"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
            - name: get-employee-jobs
              method: GET
              description: "Get employee job assignment"
              inputParameters:
                - name: employeeId
                  in: path
                  type: string
                  required: true
                  description: "Employee identifier"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
        - name: pay-rates
          path: /personnel/v2/employees/{employeeId}/pay-rates
          description: "Employee pay rates"
          operations:
            - name: get-pay-rates
              method: GET
              description: "Get pay rates for an employee"
              inputParameters:
                - name: employeeId
                  in: path
                  type: string
                  required: true
                  description: "Employee identifier"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
        - name: benefits
          path: /personnel/v2/employees/{employeeId}/benefits-elections
          description: "Employee benefits elections"
          operations:
            - name: get-benefits-elections
              method: GET
              description: "Get benefits elections for an employee"
              inputParameters:
                - name: employeeId
                  in: path
                  type: string
                  required: true
                  description: "Employee identifier"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
        - name: org
          path: /org/v2/departments
          description: "Organizational structure"
          operations:
            - name: list-departments
              method: GET
              description: "List all departments"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
            - name: list-locations
              method: GET
              description: "List all work locations"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
        - name: pay-statements
          path: /payroll/v1/pay-statements
          description: "Employee pay statements"
          operations:
            - name: list-pay-statements
              method: GET
              description: "Get pay statement history"
              inputParameters:
                - name: employeeId
                  in: query
                  type: string
                  required: false
                  description: "Filter by employee"
                - name: startDate
                  in: query
                  type: string
                  required: false
                  description: "Start date"
                - name: endDate
                  in: query
                  type: string
                  required: false
                  description: "End date"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."

  exposes:
    - type: rest
      port: 8100
      namespace: pro-hcm-api
      resources:
        - path: /v1/employees
          name: employees
          description: "Employee records"
          operations:
            - method: GET
              name: list-employees
              description: "List employees"
              call: "pro-hcm.list-employees"
              outputParameters:
                - type: object
                  mapping: "$."
    - type: mcp
      port: 9100
      namespace: pro-hcm-mcp
      transport: http
      tools:
        - name: list-employees
          description: "List all employee records"
          hints:
            readOnly: true
            openWorld: true
          call: "pro-hcm.list-employees"
          outputParameters:
            - type: object
              mapping: "$."
        - name: get-employee
          description: "Get an employee record by ID"
          hints:
            readOnly: true
            openWorld: true
          call: "pro-hcm.get-employee"
          outputParameters:
            - type: object
              mapping: "$."
        - name: get-benefits-elections
          description: "Get benefits elections for an employee"
          hints:
            readOnly: true
            openWorld: true
          call: "pro-hcm.get-benefits-elections"
          outputParameters:
            - type: object
              mapping: "$."
        - name: list-pay-statements
          description: "Get employee pay statement history"
          hints:
            readOnly: true
            openWorld: true
          call: "pro-hcm.list-pay-statements"
          outputParameters:
            - type: object
              mapping: "$."
